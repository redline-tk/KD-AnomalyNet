model:
  teacher:
    detectors:
      - autoencoder
      - vae
      - isolation_forest
      - lof
    ae_hidden_dims: [64, 32, 16, 32, 64]
    vae_latent_dim: 8
    if_n_estimators: 100
    lof_n_neighbors: 20

  student:
    hidden_dims: [32, 16]
    dropout: 0.1
    activation: relu

distillation:
  temperature_init: 5.0
  temperature_final: 1.0
  temperature_decay: exponential
  alpha: 0.7  # weight for distillation loss vs reconstruction
  boundary_margin: 0.1  # samples within this margin of threshold get extra weight
  boundary_weight: 2.0

training:
  epochs: 100
  batch_size: 256
  learning_rate: 0.001
  weight_decay: 0.0001
  early_stopping_patience: 15
  validation_split: 0.15

evaluation:
  contamination: 0.05
  metrics:
    - auc_roc
    - auc_pr
    - f1
    - precision
    - recall
